---
- name: Add Tailscale signing key
  shell: curl -fsSL https://pkgs.tailscale.com/stable/ubuntu/noble.noarmor.gpg | tee /usr/share/keyrings/tailscale-archive-keyring.gpg > /dev/null
  args:
    creates: /usr/share/keyrings/tailscale-archive-keyring.gpg

- name: Add Tailscale apt repository
  shell: curl -fsSL https://pkgs.tailscale.com/stable/ubuntu/noble.tailscale-keyring.list | tee /etc/apt/sources.list.d/tailscale.list > /dev/null
  args:
    creates: /etc/apt/sources.list.d/tailscale.list

- name: Install Tailscale
  apt:
    name: tailscale
    update_cache: yes

- name: Enable and start tailscaled
  systemd:
    name: tailscaled
    enabled: yes
    state: started

- name: Allow Tailscale interface in UFW
  ufw:
    rule: allow
    interface: tailscale0
    direction: in

- name: Bring Tailscale up
  shell: tailscale up --authkey={{ tailscale_authkey }} {{ tailscale_up_args }}
  when: tailscale_authkey != ""
  register: tailscale_up_result
  changed_when: "'Success' in tailscale_up_result.stdout or tailscale_up_result.rc == 0"
